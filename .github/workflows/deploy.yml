name: Build & Deploy

on:
  push:
    branches: [main, master, 'feature/**', 'fix/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build Wasm kernel
        working-directory: wasm
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Copy Wasm to dist
        run: cp wasm/target/wasm32-unknown-unknown/release/tier2_kernel.wasm dist/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build TypeScript
        working-directory: ts
        run: |
          npm install
          npx tsc -p tsconfig.transformer.json

      - name: Copy TS output to dist
        run: cp ts/dist/tier2_transformer.js dist/

      - name: Verify dist contents
        run: ls -lh dist/

      - name: Determine deploy path
        id: dest
        run: |
          if [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.ref_name }}" = "master" ]; then
            echo "dir=." >> $GITHUB_OUTPUT
          else
            echo "dir=branches/${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.dest.outputs.dir }}
          keep_files: true
          commit_message: 'deploy: ${{ github.ref_name }} → ${{ github.sha }}'
