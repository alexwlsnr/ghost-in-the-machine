<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Ghost in the Machine</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #33ff33;
    font-family: 'VT323', 'Courier New', monospace;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
  }

  #screen {
    width: 100vw;
    height: 100dvh;
    background: #0c0c0c;
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.8);
  }

  #scanlines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.3) 2px,
      rgba(0,0,0,0.3) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* Bars sit above scanlines and have solid backgrounds to block them */
  #model-switcher, #status-bar, #input-line {
    position: relative;
    z-index: 15;
  }

  /* ── Model switcher bar ── */
  #model-switcher {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    padding: 6px 16px;
    gap: 6px;
    border-bottom: 1px solid #33ff3322;
    background: #0d1a0d;
  }

  /* Primary chips — clickable, take up left side */
  .model-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 19px;
    padding: 4px 14px;
    border: 1px solid #33ff3333;
    background: transparent;
    cursor: pointer;
    line-height: 1.4;
    white-space: nowrap;
    user-select: none;
    transition: background 0.1s, border-color 0.1s, color 0.1s;
  }

  .model-chip:hover { background: #33ff3311; border-color: #33ff3366; color: #33ff33; }

  .model-chip.active {
    border-color: #33ff33;
    color: #33ff33;
    background: #33ff3319;
  }

  .model-chip.available-unloaded {
    border-color: #33ff3333;
    color: #33ff3366;
  }
  .model-chip.available-unloaded:hover { color: #33ff33; border-color: #33ff3388; }

  .model-chip.loading-chip {
    border-color: #ffaa0066;
    color: #ffaa00;
    cursor: default;
  }

  /* Push legacy dropdown to the right */
  #legacy-spacer { flex: 1; }

  /* Legacy dropdown */
  #legacy-wrapper {
    position: relative;
    flex-shrink: 0;
  }

  #legacy-btn {
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 16px;
    padding: 4px 12px;
    background: transparent;
    border: 1px solid #33ff3333;
    color: #33ff3366;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
  }
  #legacy-btn:hover { background: #33ff3311; color: #33ff3399; border-color: #33ff3355; }

  #legacy-menu {
    display: none;
    position: absolute;
    right: 0;
    top: calc(100% + 4px);
    background: #0d1a0d;
    border: 1px solid #33ff3344;
    min-width: 220px;
    z-index: 100;
    padding: 4px 0;
    box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    max-height: 80vh;
    overflow-y: auto;
  }
  #legacy-menu.open { display: block; }

  .legacy-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 16px;
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 20px;
    color: #33ff3388;
    cursor: pointer;
    gap: 16px;
    white-space: nowrap;
  }
  .legacy-item:hover { background: #33ff3314; color: #33ff33; }
  .legacy-item.active { color: #33ff33; background: #33ff3311; }
  .legacy-item.loading { color: #ffaa00; cursor: default; }
  .legacy-item-size { font-size: 15px; color: #33ff3366; flex-shrink: 0; }
  .legacy-section {
    padding: 6px 16px 3px;
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 13px;
    color: #33ff3344;
    letter-spacing: 0.12em;
    border-top: 1px solid #33ff3318;
    margin-top: 2px;
    user-select: none;
    pointer-events: none;
  }
  .legacy-section:first-child { border-top: none; margin-top: 0; }

  /* Progress bar inside loading chip */
  .chip-progress {
    display: inline-block;
    width: 50px;
    height: 3px;
    background: #222;
    vertical-align: middle;
    overflow: hidden;
  }
  .chip-progress-fill {
    height: 100%;
    background: #ffaa00;
    width: 0%;
    transition: width 0.3s;
  }

  .chip-load-btn {
    background: none;
    border: 1px solid #33ff3344;
    color: #33ff3366;
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 14px;
    padding: 0 6px;
    cursor: pointer;
    line-height: 1.4;
  }
  .chip-load-btn:hover { background: #33ff3311; color: #33ff33; border-color: #33ff33; }

  .chip-soon {
    font-size: 12px;
    color: #33ff3333;
    letter-spacing: 0.5px;
  }

  .chip-progress {
    display: inline-block;
    width: 60px;
    height: 4px;
    background: #222;
    vertical-align: middle;
    overflow: hidden;
  }

  .chip-progress-fill {
    height: 100%;
    background: #ffaa00;
    width: 0%;
    transition: width 0.3s;
  }

  /* ── Terminal ── */
  #terminal {
    flex: 1 1 auto;
    padding: 24px;
    overflow-y: auto;
    font-size: 28px;
    line-height: 1.4;
    white-space: pre-wrap;
    word-break: break-all;
  }

  #terminal .boot { color: #888; }
  #terminal .ready { color: #33ff33; }
  #terminal .prompt { color: #ffaa00; }
  #terminal .response { color: #66ff66; }
  #terminal .error { color: #ff3333; }
  #terminal .stats { color: #555; font-size: 18px; }
  #terminal .switch-msg { color: #ffaa00; }

  /* ── Input line ── */
  #input-line {
    flex: 0 0 58px;
    display: flex;
    align-items: center;
    padding: 0 24px;
    border-top: 1px solid #33ff3322;
  }

  #prompt-marker {
    color: #ffaa00;
    margin-right: 10px;
    font-size: 28px;
  }

  #query-input {
    flex: 1;
    background: transparent;
    border: none;
    color: #fff;
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 28px;
    outline: none;
    caret-color: #33ff33;
    text-transform: uppercase;
    min-width: 0;
  }

  #temp-group {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: 16px;
    flex-shrink: 0;
  }

  #temp-label {
    color: #33ff3388;
    font-size: 18px;
    user-select: none;
  }

  #temp-value {
    color: #33ff33;
    font-size: 22px;
    min-width: 36px;
    text-align: center;
    user-select: none;
  }

  .temp-btn {
    background: none;
    border: 1px solid #33ff3344;
    color: #33ff33;
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 18px;
    padding: 2px 6px;
    cursor: pointer;
    line-height: 1;
  }

  .temp-btn:hover { background: #33ff3311; }
  .temp-btn:active { background: #33ff3322; }

  #query-input::placeholder {
    text-transform: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .thinking {
    color: #33ff33;
    animation: pulse 0.8s ease-in-out infinite;
  }

  /* ── Status bar ── */
  #status-bar {
    flex: 0 0 30px;
    background: #0d1a0d;
    display: flex;
    align-items: center;
    padding: 0 24px;
    font-size: 18px;
    color: #33ff3388;
    justify-content: space-between;
    border-top: 1px solid #33ff3322;
  }

  /* ── Loading overlay ── */
  #loading-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 20;
    font-size: 26px;
  }

  #loading-bar {
    width: 300px;
    height: 4px;
    background: #222;
    margin-top: 16px;
    border-radius: 2px;
    overflow: hidden;
  }

  #loading-fill {
    height: 100%;
    background: #33ff33;
    width: 0%;
    transition: width 0.3s;
  }

  .hidden { display: none !important; }

  /* ── Mobile ─────────────────────────────────────────────────────────────── */
  @media (max-width: 600px) {
    /* Use dynamic viewport height so iOS browser chrome doesn't clip content */
    body, #screen {
      height: 100dvh;
    }

    /* Model switcher: scroll horizontally instead of wrapping */
    #model-switcher {
      padding: 6px 12px;
      gap: 6px;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: none;           /* Firefox */
      -webkit-overflow-scrolling: touch;
    }
    #model-switcher::-webkit-scrollbar { display: none; }

    .model-chip { font-size: 16px; padding: 3px 10px; }
    #legacy-btn { font-size: 14px; padding: 3px 9px; }
    /* Fix: overflow-x:auto on model-switcher creates a clipping context that
       cuts off the absolutely-positioned dropdown. Switch to fixed so it
       escapes the scroll container and anchors to the viewport instead. */
    #legacy-menu {
      position: fixed;
      top: 42px; /* sits just below the model-switcher bar */
      right: 8px;
      min-width: 200px;
      /* #screen carries a transform (visualViewport pin), so it is the containing
         block for this fixed menu — 100% = the VISIBLE region height, not the full
         layout viewport. Keeps the menu inside the window above the keyboard with
         its own scroll, so there's no need to dismiss the keyboard to browse it. */
      max-height: calc(100% - 52px);
      overflow-y: auto;
    }
    .legacy-item { font-size: 17px; padding: 8px 12px; }
    .legacy-item-size { font-size: 13px; }

    /* Terminal */
    #terminal {
      padding: 12px;
      font-size: 22px;
    }
    #terminal .stats { font-size: 14px; }

    /* Input line */
    #input-line {
      flex: 0 0 54px;
      padding: 0 12px;
    }

    #prompt-marker { font-size: 22px; margin-right: 8px; }

    #query-input { font-size: 22px; } /* ≥16px prevents iOS auto-zoom on focus */

    /* Hide TEMP label to free width; keep +/- buttons and value */
    #temp-label  { display: none; }
    #temp-group  { gap: 4px; margin-left: 10px; }
    #temp-value  { font-size: 18px; min-width: 28px; }
    .temp-btn    { font-size: 16px; padding: 4px 10px; } /* larger touch target */

    /* Status bar */
    #status-bar {
      flex: 0 0 26px;
      padding: 0 12px;
      font-size: 14px;
    }

    #model-info {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 55%;
    }

    #simd-badge, #mem-badge, #punct-badge { font-size: 11px; padding: 1px 5px; margin-left: 5px; }

    /* Status bar right side: shrink model-info more to give badges room */
    #model-info { max-width: 40%; }

    /* Loading overlay */
    #loading-overlay { font-size: 20px; }
    #loading-bar     { width: 82%; }
  }
</style>
</head>
<body>

<div id="screen">
  <div id="scanlines"></div>

  <div id="loading-overlay">
    <div id="loading-title">INITIALIZING GHOST...</div>
    <div id="loading-bar"><div id="loading-fill"></div></div>
    <div id="loading-text" style="margin-top:8px;font-size:14px;color:#888;"></div>
  </div>

  <!-- Model switcher bar -->
  <div id="model-switcher">
    <!-- Primary chips rendered dynamically here -->
    <div id="legacy-spacer"></div>
    <div id="legacy-wrapper">
      <button id="legacy-btn">MORE ▾</button>
      <div id="legacy-menu"><!-- legacy items rendered dynamically --></div>
    </div>
  </div>

  <div id="terminal"></div>

  <div id="status-bar">
    <span id="model-info">---</span>
    <button id="simd-badge" style="display:none;font-family:'VT323','Courier New',monospace;font-size:13px;padding:2px 8px;margin-left:10px;letter-spacing:1px;cursor:pointer;background:transparent;border:1px solid #00ffff44;color:#00ffff;" title="Toggle SIMD kernel">⚡ SIMD</button>
    <button id="mem-badge" style="font-family:'VT323','Courier New',monospace;font-size:13px;padding:2px 8px;margin-left:10px;letter-spacing:1px;cursor:pointer;background:transparent;border:1px solid #33ff3322;color:#33ff3344;" title="Enable conversation memory for all models (experimental on ctx=128)">○ MEM</button>
    <button id="punct-badge" style="font-family:'VT323','Courier New',monospace;font-size:13px;padding:2px 8px;margin-left:10px;letter-spacing:1px;cursor:pointer;background:#33ff3311;border:1px solid #33ff3366;color:#33ff33;" title="Punctuation stop heuristic ON — stops generation when a token without a leading space follows end punctuation. Click to disable for raw output.">● PSTOP</button>
    <span id="perf-info">---</span>
  </div>

  <div id="input-line">
    <span id="prompt-marker">></span>
    <input id="query-input" type="text" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="TYPE YOUR QUERY..." autofocus disabled>
    <div id="temp-group">
      <span id="temp-label">TEMP</span>
      <button id="temp-down" class="temp-btn">◂</button>
      <span id="temp-value">0.8</span>
      <button id="temp-up" class="temp-btn">▸</button>
    </div>
    <button id="clear-btn" class="temp-btn" style="margin-left:12px;color:#33ff3366;border-color:#33ff3322;" title="Clear conversation history">CLR</button>
  </div>
</div>

<script type="module">
// Code files (tiny) — always fresh to avoid stale-cache bugs.
// Model weights — versioned so they cache between reloads.
const _t = Date.now();
const { loadModel, encode, generate, createCache, detectSIMD, buildContextTokens } = await import('./tier2_transformer.js?t=' + _t);
const { GPUEngine, shouldUseGPU } = await import('./gpu_engine.js?t=' + _t);

// Detect SIMD support; track whether it's currently enabled (toggleable)
const simdSupported = await detectSIMD();
let simdEnabled = simdSupported;
const gpuAvailable = !!(await navigator.gpu?.requestAdapter().catch(() => null));

function activeWasmFile() {
  return (simdEnabled && simdSupported)
    ? './tier2_kernel_simd.wasm?t=' + _t
    : './tier2_kernel.wasm?t=' + _t;
}

const terminal    = document.getElementById('terminal');
const input       = document.getElementById('query-input');
const loading     = document.getElementById('loading-overlay');
const loadingFill = document.getElementById('loading-fill');
const loadingText = document.getElementById('loading-text');
const loadingTitle = document.getElementById('loading-title');
const modelInfo   = document.getElementById('model-info');
const perfInfo    = document.getElementById('perf-info');
const switcher    = document.getElementById('model-switcher');

let temperature = 0.8;
const TEMP_MIN = 0.1, TEMP_MAX = 2.0, TEMP_STEP = 0.1;

// ── Multi-model state ──────────────────────────────────────────────────────
// registry: array of model descriptors from models.json
// modelCache: id → loaded model object (cached after first load)
// activeId: currently active model id
let registry   = [];
let modelCache = {};
let kvCaches   = {};      // id → KVCache — one per loaded model, reused across queries
let gpuEngines = {};      // id → GPUEngine | null — GPU engine per model (null if not eligible)
let histories  = {};      // id → Turn[] — conversation history per model
let memoryOn   = false;   // off by default — multi-turn training needs more data before enabling
let activeId   = null;
let isSwitching = false;

// ── Helpers ───────────────────────────────────────────────────────────────
function updateTempDisplay() {
  document.getElementById('temp-value').textContent = temperature.toFixed(1);
}

document.getElementById('temp-up').addEventListener('click', () => {
  temperature = Math.min(TEMP_MAX, Math.round((temperature + TEMP_STEP) * 10) / 10);
  updateTempDisplay();
});
document.getElementById('temp-down').addEventListener('click', () => {
  temperature = Math.max(TEMP_MIN, Math.round((temperature - TEMP_STEP) * 10) / 10);
  updateTempDisplay();
});

function appendLine(text, cls = '') {
  const div = document.createElement('div');
  div.className = cls;
  div.textContent = text;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

function setInputEnabled(enabled) {
  // Use readOnly, never disabled: a disabled input loses focus, which on mobile
  // dismisses the on-screen keyboard — then re-focusing on completion makes it
  // pop back up over the response. readOnly blocks input while keeping focus,
  // so the keyboard stays put across the generate cycle.
  input.disabled = false;
  input.readOnly = !enabled;
  if (enabled) input.focus();
}

// ── Status bar ────────────────────────────────────────────────────────────
function updateStatusBar(reg) {
  if (!reg) { modelInfo.textContent = '---'; return; }
  const gpu = reg && gpuEngines[reg.id];
  const kernel = gpu ? '⚡ WebGPU' : (simdEnabled && simdSupported ? '⚡ SIMD' : 'Wasm');
  modelInfo.textContent = `${reg.name.toUpperCase()} · ${reg.params} params · ${reg.ctx} ctx · ${kernel}`;
}

// ── Model switcher chips ───────────────────────────────────────────────────
function makeProgressChip(reg) {
  const chip = document.createElement('span');
  chip.className = 'model-chip loading-chip';
  chip.id = `chip-${reg.id}`;
  chip.textContent = reg.name.toUpperCase() + ' ';
  const bar = document.createElement('span'); bar.className = 'chip-progress';
  const fill = document.createElement('span'); fill.className = 'chip-progress-fill'; fill.id = `chip-fill-${reg.id}`;
  bar.appendChild(fill); chip.appendChild(bar);
  return chip;
}

function renderSwitcher() {
  const legacyMenu   = document.getElementById('legacy-menu');
  const legacySpacer = document.getElementById('legacy-spacer');
  const legacyWrapper= document.getElementById('legacy-wrapper');

  // Clear primary chips (everything before spacer)
  while (switcher.firstChild && switcher.firstChild !== legacySpacer) {
    switcher.removeChild(switcher.firstChild);
  }
  legacyMenu.innerHTML = '';

  const primary   = registry.filter(r => r.primary && r.available !== false);
  const secondary = registry.filter(r => !r.primary);
  let   hasLegacy = false;

  // Primary chips
  for (const reg of primary) {
    let chip;
    if (reg._loading) {
      chip = makeProgressChip(reg);
    } else {
      chip = document.createElement('button');
      chip.className = 'model-chip' + (reg.id === activeId ? ' active' : ' available-unloaded');
      chip.textContent = reg.name.toUpperCase();
      chip.title = reg.description || '';
      if (reg.id !== activeId) chip.addEventListener('click', () => switchModel(reg.id));
    }
    switcher.insertBefore(chip, legacySpacer);
  }

  // Legacy dropdown items — grouped by section
  const sectionLabels = { bpe: 'BPE TERNARY', ablation: 'ABLATIONS', classic: 'CLASSIC', reference: 'REFERENCE' };
  const sectionOrder  = ['bpe', 'ablation', 'classic', 'reference'];
  const grouped = {};
  for (const reg of secondary) {
    if (!reg.available) continue;
    const key = reg.group || 'reference';
    (grouped[key] = grouped[key] || []).push(reg);
  }
  for (const key of sectionOrder) {
    const items = grouped[key];
    if (!items || !items.length) continue;
    hasLegacy = true;
    const hdr = document.createElement('div');
    hdr.className = 'legacy-section';
    hdr.textContent = sectionLabels[key] || key.toUpperCase();
    legacyMenu.appendChild(hdr);
    for (const reg of items) {
      const item = document.createElement('div');
      item.className = 'legacy-item' + (reg.id === activeId ? ' active' : '') + (reg._loading ? ' loading' : '');
      item.innerHTML = `<span>${reg.name.toUpperCase()}</span><span class="legacy-item-size">${reg.size_mb}MB</span>`;
      if (reg._loading) {
        const bar = document.createElement('span'); bar.className = 'chip-progress';
        const fill = document.createElement('span'); fill.className = 'chip-progress-fill'; fill.id = `chip-fill-${reg.id}`;
        bar.appendChild(fill); item.appendChild(bar);
      } else if (reg.id !== activeId) {
        item.addEventListener('click', () => { closeLegacyMenu(); switchModel(reg.id); });
      }
      legacyMenu.appendChild(item);
    }
  }
  legacyWrapper.style.display = hasLegacy ? '' : 'none';
}

// ── Switch / load model ───────────────────────────────────────────────────
async function switchModel(id) {
  if (id === activeId || isSwitching) return;
  const reg = registry.find(r => r.id === id);
  if (!reg || !reg.available) return;

  isSwitching = true;
  setInputEnabled(false);

  // If cached, activate immediately
  if (modelCache[id]) {
    activeId = id;
    if (reg.temp !== undefined) { temperature = reg.temp; updateTempDisplay(); }
    terminal.innerHTML = '';
    appendLine(`SWITCHING TO ${reg.name.toUpperCase()}...`, 'switch-msg');
    appendLine('', '');
    appendLine('READY. ENTER QUERY:', 'ready');
    updateStatusBar(reg);
    renderSwitcher();
    isSwitching = false;
    setInputEnabled(true);
    return;
  }

  // Mark as loading
  reg._loading = true;
  renderSwitcher();

  // Show loading overlay for model switch
  loadingTitle.textContent = `LOADING ${reg.name.toUpperCase()}...`;
  loadingFill.style.width = '10%';
  loading.classList.remove('hidden');

  const LOADING_PHRASES = [
    'Reticulating splines...',
    'Untangling the neural webs...',
    'Charging the ectoplasm...',
    'Whispering to the weights...',
    'Consulting the parameter oracle...',
    'Flattening the embedding space...',
    'Reversing the polarity...',
    'Summoning attention heads...',
    'Calibrating the ghost frequency...',
    'Warming up the ternary neurons...',
    'Aligning the transformer layers...',
    'Invoking the matrix spirits...',
    'Defragmenting the latent space...',
    'Teaching weights to haunt...',
    'Quantizing the soul...',
    'Negotiating with the softmax...',
    'Initializing existential dread...',
    'Counting the zeroes and ones...',
    'Tuning the spectral frequencies...',
    'Greasing the attention mechanisms...',
    'Establishing ghost protocol...',
    'Rerouting through the void...',
    'Cross-referencing the corpus...',
    'Unpacking the binary séance...',
    'Synchronizing parallel universes...',
  ];
  let _phraseIdx = Math.floor(Math.random() * LOADING_PHRASES.length);
  loadingText.textContent = LOADING_PHRASES[_phraseIdx];
  const _phraseTicker = setInterval(() => {
    _phraseIdx = (_phraseIdx + 1) % LOADING_PHRASES.length;
    loadingText.textContent = LOADING_PHRASES[_phraseIdx];
  }, 1800);

  try {
    const loaded = await loadModel({
      wasm: activeWasmFile(),
      bin:  modelUrls(reg).bin,
      json: modelUrls(reg).json,
      onProgress: (pct) => {
        loadingFill.style.width = pct + '%';
        const fill = document.getElementById(`chip-fill-${reg.id}`);
        if (fill) fill.style.width = pct + '%';
      },
    });

    modelCache[id] = loaded;
    kvCaches[id]   = createCache(loaded);
    reg._loading = false;
    activeId = id;
    if (reg.temp !== undefined) { temperature = reg.temp; updateTempDisplay(); }

    // Try to create GPU engine for eligible models
    if (gpuAvailable && shouldUseGPU(loaded.manifest)) {
      loadingText.textContent = 'Supercharging with WebGPU...';
      gpuEngines[id] = await GPUEngine.create(
        loaded.manifest, loaded.sec, loaded.api.memory, loaded.base
      ).catch(e => { console.warn('WebGPU init failed:', e); return null; });
      console.log('[gpu]', id, gpuEngines[id] ? 'GPU engine ready ⚡' : 'GPU unavailable, falling back to Wasm');
    } else {
      gpuEngines[id] = null;
    }

    clearInterval(_phraseTicker);
    loadingFill.style.width = '100%';
    loadingText.textContent = 'Ready.';

    setTimeout(() => {
      loading.classList.add('hidden');
      terminal.innerHTML = '';
      appendLine(`SWITCHING TO ${reg.name.toUpperCase()}...`, 'switch-msg');
      appendLine('', '');
      appendLine('READY. ENTER QUERY:', 'ready');
      updateStatusBar(reg);
      renderSwitcher();
      isSwitching = false;
      setInputEnabled(true);
    }, 400);

  } catch(e) {
    clearInterval(_phraseTicker);
    reg._loading = false;
    loading.classList.add('hidden');
    appendLine(`LOAD ERROR [${reg.name}]: ${e.message}`, 'error');
    renderSwitcher();
    isSwitching = false;
    setInputEnabled(activeId !== null);
  }
}

// ── Active model accessor ─────────────────────────────────────────────────
function activeModel() {
  return modelCache[activeId] || null;
}

// Resolve bin/json URLs — prefer bin_url/json_url (GitHub Releases) over local path
// Always use local paths for now — GitHub Releases doesn't support CORS from browsers.
// bin_url/json_url in models.json is reserved for future CDN (HuggingFace/R2) integration.
function modelUrls(reg) {
  const bin  = `./${reg.bin}?v=1`;
  const json = `./${reg.json}?v=1`;
  return { bin, json };
}

// ── Boot ──────────────────────────────────────────────────────────────────
async function boot() {
  // Fetch registry
  let data;
  try {
    const resp = await fetch('./models.json?v=1');
    data = await resp.json();
  } catch(e) {
    appendLine('REGISTRY ERROR: could not load models.json', 'error');
    loading.classList.add('hidden');
    return;
  }

  registry = data.models.map(m => ({ ...m, _loading: false }));
  const defaultModel = registry.find(r => r.default) || registry[0];

  // SIMD badge — show if supported, wire up toggle
  const simdBadge = document.getElementById('simd-badge');
  function updateSimdBadge() {
    if (!simdSupported) return;
    simdBadge.style.display     = 'inline';
    simdBadge.title             = simdEnabled ? 'SIMD ON — click to disable' : 'SIMD OFF — click to enable';
    simdBadge.style.color       = simdEnabled ? '#00ffff'   : '#33ff3366';
    simdBadge.style.borderColor = simdEnabled ? '#00ffff88' : '#33ff3333';
    simdBadge.style.background  = simdEnabled ? '#00ffff11' : 'transparent';
    simdBadge.textContent       = simdEnabled ? '⚡ SIMD ON' : '○ SIMD OFF';
  }
  updateSimdBadge();

  simdBadge.addEventListener('click', () => {
    if (!simdSupported || isSwitching) return;
    simdEnabled = !simdEnabled;
    updateSimdBadge();
    const prev = activeId;
    modelCache = {};
    kvCaches   = {};
    gpuEngines = {};
    activeId   = null;  // clear so switchModel doesn't treat it as already-loaded
    appendLine(`KERNEL: switching to ${simdEnabled ? 'SIMD128 ⚡' : 'scalar'} — reloading...`, 'boot');
    if (prev) switchModel(prev);
  });

  // Boot message
  appendLine('GHOST IN THE MACHINE v2.5 (build 18)', 'ready');
  appendLine(`Kernel: WebAssembly${simdSupported ? ' + SIMD128 ⚡' : ' (scalar)'}${gpuAvailable ? ' · WebGPU available ⚡' : ''}`, 'boot');
  appendLine('Byte-level Tiny Transformer | Multi-model registry', 'boot');
  appendLine('', 'boot');
  appendLine('SELECT MODEL:', 'boot');
  for (const reg of registry) {
    const status = reg.available
      ? (reg.default ? '[DEFAULT]' : '[available]')
      : '[coming soon]';
    appendLine(`  ${reg.name.toUpperCase()} — ${reg.description}  ${status}`, 'boot');
  }
  appendLine('───────────────────────────────────────────────', 'boot');

  // Render switcher with no active model yet
  renderSwitcher();

  // Load the default model
  loadingTitle.textContent = `LOADING ${defaultModel.name.toUpperCase()}...`;
  loadingFill.style.width = '10%';

  const BOOT_PHRASES = [
    'Reticulating splines...',
    'Untangling the neural webs...',
    'Charging the ectoplasm...',
    'Whispering to the weights...',
    'Consulting the parameter oracle...',
    'Flattening the embedding space...',
    'Reversing the polarity...',
    'Summoning attention heads...',
    'Calibrating the ghost frequency...',
    'Warming up the ternary neurons...',
    'Aligning the transformer layers...',
    'Invoking the matrix spirits...',
    'Defragmenting the latent space...',
    'Teaching weights to haunt...',
    'Quantizing the soul...',
    'Negotiating with the softmax...',
    'Initializing existential dread...',
    'Counting the zeroes and ones...',
    'Tuning the spectral frequencies...',
    'Greasing the attention mechanisms...',
    'Establishing ghost protocol...',
    'Rerouting through the void...',
    'Cross-referencing the corpus...',
    'Unpacking the binary séance...',
    'Synchronizing parallel universes...',
  ];
  let _bootPhraseIdx = Math.floor(Math.random() * BOOT_PHRASES.length);
  loadingText.textContent = BOOT_PHRASES[_bootPhraseIdx];
  const _bootTicker = setInterval(() => {
    _bootPhraseIdx = (_bootPhraseIdx + 1) % BOOT_PHRASES.length;
    loadingText.textContent = BOOT_PHRASES[_bootPhraseIdx];
  }, 1800);

  defaultModel._loading = true;
  renderSwitcher();

  try {
    const loaded = await loadModel({
      wasm: activeWasmFile(),
      bin:  modelUrls(defaultModel).bin,
      json: modelUrls(defaultModel).json,
      onProgress: (pct) => { loadingFill.style.width = (10 + pct * 0.9) + '%'; },
    });

    modelCache[defaultModel.id] = loaded;
    kvCaches[defaultModel.id]   = createCache(loaded);
    defaultModel._loading = false;
    activeId = defaultModel.id;
    if (defaultModel.temp !== undefined) { temperature = defaultModel.temp; updateTempDisplay(); }

    // Try GPU engine for eligible models
    if (gpuAvailable && shouldUseGPU(loaded.manifest)) {
      loadingText.textContent = 'Supercharging with WebGPU...';
      gpuEngines[defaultModel.id] = await GPUEngine.create(
        loaded.manifest, loaded.sec, loaded.api.memory, loaded.base
      ).catch(e => { console.warn('WebGPU init failed:', e); return null; });
    } else {
      gpuEngines[defaultModel.id] = null;
    }

    clearInterval(_bootTicker);
    loadingFill.style.width = '100%';
    loadingText.textContent = 'Ready.';

  } catch(e) {
    clearInterval(_bootTicker);
    defaultModel._loading = false;
    appendLine(`LOAD ERROR: ${e.message}`, 'error');
    loading.classList.add('hidden');
    renderSwitcher();
    return;
  }

  const reg = registry.find(r => r.id === activeId);
  updateStatusBar(reg);
  renderSwitcher();

  setTimeout(() => {
    loading.classList.add('hidden');
    setInputEnabled(true);
    appendLine('', '');
    appendLine('READY. ENTER QUERY:', 'ready');
  }, 500);
}

// ── Prompt history (shell-style ↑/↓ recall) ──────────────────────────────
const promptHistory = [];
let historyIndex = -1;   // -1 = live input, 0 = most recent
let liveDraft = '';      // saved input while browsing history
let busy = false;        // generating — blocks re-submit WITHOUT blurring the input,
                         // so the mobile keyboard never dismisses/re-pops on submit

// ── Input handler ─────────────────────────────────────────────────────────
input.addEventListener('keydown', async (e) => {
  // History navigation
  if ((e.key === 'ArrowUp' || e.key === 'ArrowDown') && !input.readOnly && !busy) {
    e.preventDefault();
    if (promptHistory.length === 0) return;
    if (e.key === 'ArrowUp') {
      if (historyIndex === -1) liveDraft = input.value;
      historyIndex = Math.min(historyIndex + 1, promptHistory.length - 1);
    } else {
      historyIndex = Math.max(historyIndex - 1, -1);
    }
    input.value = historyIndex === -1 ? liveDraft : promptHistory[historyIndex];
    // Move caret to end
    setTimeout(() => input.setSelectionRange(input.value.length, input.value.length), 0);
    return;
  }

  if (e.key !== 'Enter' || !activeModel() || input.readOnly || busy) return;
  e.preventDefault();  // stop the Android IME treating Enter as "done" and closing the keyboard

  const query = input.value.trim();
  if (!query) return;

  // Push to history, reset index
  promptHistory.unshift(query.toUpperCase());
  if (promptHistory.length > 50) promptHistory.pop();
  historyIndex = -1;
  liveDraft = '';

  input.value = '';
  busy = true;   // keep the input focused (keyboard stays up); just block re-submit
  appendLine(`> ${query.toUpperCase()}`, 'prompt');

  // Thinking indicator — pulses while model processes the prompt
  const thinkEl = document.createElement('div');
  thinkEl.className = 'thinking';
  thinkEl.textContent = '▌';
  terminal.appendChild(thinkEl);
  terminal.scrollTop = terminal.scrollHeight;

  perfInfo.textContent = 'THINKING...';
  let response = '';
  const startTime = performance.now();
  let tokenCount = 0;
  const m = activeModel();
  const reg = registry.find(r => r.id === activeId);
  // MEM toggle controls history injection for all models
  const history = memoryOn ? (histories[activeId] || []) : undefined;
  console.log('[generate] model:', activeId, '| arch:', m?.manifest, '| history turns:', history?.length ?? 0);

  let hitLimit = false;
  try {
    // Larger models on longer contexts can ramble — cap response length per model
    const maxNew = reg?.max_new ?? (reg?.ctx >= 512 ? 120 : 160);
    const topK   = reg?.top_k  ?? 0;
    const topP   = reg?.top_p  ?? 1.0;
    const gpu = gpuEngines[activeId] || undefined;
    for await (const step of generate(activeModel(), query, maxNew, temperature, Math.random, gpu ? undefined : kvCaches[activeId], topK, topP, history, gpu, punctStopOn)) {
      if (step.done) {
        hitLimit = step.token !== 257; // 257=EOS = clean stop; PAD/ctx = truncated
        break;
      }

      // Replace thinking indicator with response on first token
      if (tokenCount === 0) {
        thinkEl.remove();
        perfInfo.textContent = 'GENERATING...';
      }

      response += step.char;
      tokenCount++;

      // Update live
      const lastChild = terminal.lastElementChild;
      if (lastChild && lastChild.className === 'response') {
        lastChild.textContent = response;
      } else {
        appendLine(response, 'response');
      }
      terminal.scrollTop = terminal.scrollHeight;
    }
  } catch(e) {
    thinkEl.remove();
    console.error('[generate] error:', e);
    appendLine(`ERROR: ${e.message}`, 'error');
  }

  // Only trim when generation was cut off mid-sentence (hit token/context limit).
  // When the model fired EOS cleanly, trust its ending.
  if (hitLimit && response && !/[.!?]\s*$/.test(response)) {
    // Find last sentence boundary: . ! ? followed by space or uppercase (new sentence)
    let best = -1;
    for (const re of [/[.!?] [A-Z]/g, /[.!?][A-Z]/g]) {
      let m; while ((m = re.exec(response)) !== null) best = Math.max(best, m.index + 1);
    }
    let trimmed = response;
    if (best > response.length * 0.5) {
      trimmed = response.slice(0, best + 1);
    } else {
      const lastSpace = response.lastIndexOf(' ');
      if (lastSpace > 0) trimmed = response.slice(0, lastSpace) + '…';
    }
    const respEl = Array.from(terminal.children).reverse().find(c => c.className === 'response');
    if (respEl) respEl.textContent = trimmed;
  }

  // Record this exchange in conversation history (ctx≥256 models only)
  if (history !== undefined && response) {
    histories[activeId] = histories[activeId] || [];
    histories[activeId].push({ q: query.toUpperCase(), r: response });
    if (histories[activeId].length > 20) histories[activeId].shift();
  }

  const elapsed = performance.now() - startTime;
  const tokPerSec = elapsed > 0 ? (tokenCount * 1000 / elapsed).toFixed(1) : 0;
  const histLen = histories[activeId]?.length ?? 0;
  const histInfo = histLen > 0 ? ` · ${histLen} turn${histLen > 1 ? 's' : ''} ctx` : '';
  perfInfo.textContent = `${tokenCount} tokens in ${elapsed.toFixed(0)}ms (${tokPerSec} tok/s)${histInfo}`;

  busy = false;   // re-enable submit; input kept focus throughout so no refocus needed
});

// ── Mobile: pin the UI to the visible viewport (above the keyboard) ─────────
// The on-screen keyboard shrinks visualViewport but not the CSS layout viewport,
// so without this the keyboard overlays the input and the page can scroll the top
// bar off-screen. We pin #screen as a fixed box matching the *visible* region
// (height + offsetTop), so the model bar and input line stay put as static bars
// and only #terminal scrolls between them.
(function () {
  const vv = window.visualViewport;
  if (!vv) return;  // unsupported → CSS 100dvh fallback
  const screen = document.getElementById('screen');
  screen.style.position = 'fixed';
  screen.style.left = '0';
  screen.style.top = '0';
  screen.style.width = '100vw';
  let lastH = -1, lastT = -1;
  const place = () => {
    // size to the visible viewport and shift down by its offset (keyboard/url bar)
    const h = Math.round(vv.height), t = Math.round(vv.offsetTop);
    if (h === lastH && t === lastT) return;  // skip redundant writes: re-applying the
    // transform reflows the focused input, which makes Android's IME flip pages
    lastH = h; lastT = t;
    screen.style.height = h + 'px';
    screen.style.transform = `translateY(${t}px)`;
  };
  // reposition on every viewport change; only force scroll-to-bottom when the
  // keyboard opens/closes (resize), not on every scroll tick (avoids fighting the
  // user scrolling back through output and reduces jitter during the animation).
  vv.addEventListener('scroll', place);
  vv.addEventListener('resize', () => { place(); terminal.scrollTop = terminal.scrollHeight; });
  place();
})();

// ── Legacy model dropdown ─────────────────────────────────────────────────
const legacyBtn  = document.getElementById('legacy-btn');
const legacyMenu = document.getElementById('legacy-menu');

function closeLegacyMenu() { legacyMenu.classList.remove('open'); }

legacyBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  legacyMenu.classList.toggle('open');
  input.focus();
});
document.addEventListener('click', (e) => {
  if (!legacyMenu.contains(e.target) && e.target !== legacyBtn) closeLegacyMenu();
});

// ── Punctuation stop heuristic toggle ────────────────────────────────────
let punctStopOn = true;
const punctBadge = document.getElementById('punct-badge');
function updatePunctBadge() {
  punctBadge.textContent       = punctStopOn ? '● PSTOP' : '○ PSTOP';
  punctBadge.style.color       = punctStopOn ? '#33ff33'   : '#33ff3344';
  punctBadge.style.borderColor = punctStopOn ? '#33ff3388' : '#33ff3322';
  punctBadge.style.background  = punctStopOn ? '#33ff3311' : 'transparent';
  punctBadge.title             = punctStopOn
    ? 'Punct-stop ON — stops on no-space token after punctuation. Click to disable for raw output.'
    : 'Punct-stop OFF — raw model output. Click to enable.';
}
punctBadge.addEventListener('click', () => {
  punctStopOn = !punctStopOn;
  updatePunctBadge();
  appendLine(`PUNCT-STOP: ${punctStopOn ? 'ON' : 'OFF'}`, 'boot');
  input.focus();
});

// ── Memory mode toggle ────────────────────────────────────────────────────
const memBadge = document.getElementById('mem-badge');
function updateMemBadge() {
  memBadge.textContent       = memoryOn ? '● MEM ON' : '○ MEM';
  memBadge.style.color       = memoryOn ? '#33ff33'   : '#33ff3344';
  memBadge.style.borderColor = memoryOn ? '#33ff3388' : '#33ff3322';
  memBadge.style.background  = memoryOn ? '#33ff3311' : 'transparent';
  memBadge.title             = memoryOn
    ? 'Memory ON — click to disable (all models)'
    : 'Memory OFF — click to enable (experimental on Wisp/Shade)';
}
memBadge.addEventListener('click', () => {
  memoryOn = !memoryOn;
  updateMemBadge();
  if (memoryOn) {
    appendLine('MEMORY: ON — previous exchanges injected as context (experimental)', 'boot');
  } else {
    appendLine('MEMORY: OFF', 'boot');
    // Clear all histories when turning memory off
    histories = {};
  }
  input.focus();
});

// ── Clear conversation history ────────────────────────────────────────────
document.getElementById('clear-btn').addEventListener('click', () => {
  if (activeId) histories[activeId] = [];
  terminal.innerHTML = '';
  appendLine('HISTORY CLEARED.', 'boot');
  appendLine('', '');
  appendLine('READY. ENTER QUERY:', 'ready');
  input.focus();
});

// ── Global key capture — route printable keys to the input ───────────────
// Skips when: input is read-only (boot/generating), input already has focus, a
// button has focus, or a modifier key is held (so Ctrl+C on a selection works).
document.addEventListener('keydown', (e) => {
  if (input.readOnly) return;
  if (document.activeElement === input) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key.length !== 1) return;                 // arrow keys, Tab, Enter, etc.
  if (document.activeElement?.tagName === 'BUTTON') return;
  input.focus();
});

boot();
</script>
